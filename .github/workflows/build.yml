name: Build LsdSandbox IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:   # 手动触发

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build for iOS (Release, unsigned)
        run: |
          xcodebuild \
            -project LsdSandbox.xcodeproj \
            -scheme LsdSandbox \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO \
            build 2>&1 | tail -80

      - name: Verify build output
        run: |
          echo "=== Build products ==="
          find build/Build/Products/Release-iphoneos -maxdepth 3 -type d | sort
          echo "=== App contents ==="
          ls -la "build/Build/Products/Release-iphoneos/LsdSandbox.app/"
          echo "=== Binary ==="
          file "build/Build/Products/Release-iphoneos/LsdSandbox.app/LsdSandbox"

      - name: Fake sign binary and dylibs (for jailbreak)
        run: |
          APP="build/Build/Products/Release-iphoneos/LsdSandbox.app"
          # Fake sign main binary
          ldid -S "$APP/LsdSandbox"
          # Fake sign dylibs
          for dylib in "$APP/Frameworks"/*.dylib; do
            [ -f "$dylib" ] && ldid -S "$dylib"
          done
          echo "Fake signing complete"

      - name: Create IPA
        run: |
          APP="build/Build/Products/Release-iphoneos/LsdSandbox.app"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r LsdSandbox.ipa Payload/
          rm -rf Payload
          ls -lh LsdSandbox.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LsdSandbox.ipa
          path: LsdSandbox.ipa
          retention-days: 90

      - name: Upload app artifact (for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: LsdSandbox.app
          path: build/Build/Products/Release-iphoneos/LsdSandbox.app
          retention-days: 7